{% extends "layout.html" %}

{% block body %}

    <div class="card form-card">
        <h1 class="page-title">Login</h1>

        <form action="/login" method="post" autocomplete="off" class="form-layout">
            <div class="form-group">
                <label for="username">Username</label>
                <input name="username" id="username" type="text" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input name="password" id="password" type="password" autocomplete="current-password" required>
            </div>

            <div class="form-actions">
                <button class="btn-primary" type="submit">Login</button>
                <a href="/register" class="form-link">Create account</a>
            </div>
        </form>
    </div>
{% endblock %}
