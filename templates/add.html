{% extends "layout.html" %}

{% block body %}
    <div class="card form-card">
        <h1 class="page-title">Add Transaction</h1>

        <form action="/add" method="post" class="form-layout">
           <div class="form-group">
                <label for="type">Type</label>
                <select name="type" id="type" required>
                    <option value="">Select type</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>

            <div class="form-group">
                <label for="amount">Amount</label>
                <input name="amount" type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="category_id">Category</label>
                <select name="category_id" id="category_id" required>
                    <option value="">Select Category</option>
                    {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <input name="description" type="text" id="description">
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input name="date" type="date" id="date" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Add Transaction</button>
            </div>
        </form>
    </div>
{% endblock %}
