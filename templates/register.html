{% extends "layout.html" %}

{% block body %}
    <div class="card form-card">
        <h1 class="page-title">Register</h1>

        <form action="/register" method="post" autocomplete="off" class="form-layout">
            <div class="form-group">
                <label for="username">Username</label>
                <input name="username" id="username" type="text" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input name="password" type="password" id="password" autocomplete="new-password" required>
            </div>

            <div class="form-group">
                <label for="confirmation">Confirm password</label>
                <input name="confirmation" id="confirmation" type="password" autocomplete="new-password">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Register</button>
                <a href="/login" class="form-link">Already have an account? Login.</a>
            </div>
            </form>
    </div>
{% endblock %}
