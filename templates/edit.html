{% extends "layout.html" %}

{% block body %}
    <div class="card form-card">
        <h1 class="form-title">Edit Transaction</h1>

        <form action="/edit/{{ transaction.id }}" method="post" class="form-layout">
            <div class="form-group">
                <label for="type">Type</label>
                <select name="type" id="type" required>
                    <option value="">Select type</option>
                    <option value="income" {% if transaction.type == "income" %}selected{% endif %}>Income</option>
                    <option value="expense" {% if transaction.type == "expense" %}selected{% endif %}>Expense</option>
                </select>
            </div>

            <div class="form-group">
                <label for="category_id">Category</label>
                <select name="category_id" id="category_id" required>
                    {% for category in categories %}
                        <option value="{{ category.id }}"
                            {% if category.id == transaction.category_id %}selected{% endif %}>
                            {{ category.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="amount">Amount</label>
                <input name="amount" type="number" step="0.01" id="amount" value="{{ transaction.amount }}" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <input name="description" type="text" id="decription" value="{{ transaction.description }}">
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input name="date" type="date" id="date" value="{{ transaction.date }}" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
            
        </form>
    </div>
{% endblock %}
