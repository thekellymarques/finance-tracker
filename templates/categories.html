{% extends "layout.html" %}

{% block body %}
    <h1 class="page-title">Categories</h1>
    
    <div class="card">
        <h2 class="selection-title">Add category</h2>

        <form action="/categories" method="post" class="form-layout">
            <div class="form-group">
                <label for="name">Category name</label>
                <input name="name" type="text" id="name" autocomplete="off" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Add Category</button>
            </div>
        </form>
    </div>

    <div class="card">
        {% if categories %}
            <ul class="category-list">
                {% for category in categories %}
                    <li class="category-item">
                        <span>{{category.name}}</span>
                        <form action="/delete_category/{{ category.id }}" method="post" class="inline-form">
                            <button type="submit" class="btn btn-delete" onclick="return confirm('Delete this category?')">
                            Delete
                            </button>
                        </form>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No categories yet.</p>
        {% endif %}
    </div>
{% endblock %}
